<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070a13"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    
    <!-- Neon Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#05f3a6"/>
    </linearGradient>

    <!-- Card Background Gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.9"/>
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>
  
  <!-- Outer Ring Glow -->
  <rect x="24" y="24" width="464" height="464" rx="104" stroke="url(#accentGrad)" stroke-width="4" stroke-opacity="0.15"/>

  <!-- Card Frame -->
  <rect x="96" y="144" width="320" height="224" rx="32" fill="url(#cardGrad)" stroke="#1e293b" stroke-width="4"/>
  
  <!-- Credit Card Magnetic Strip (semi-transparent) -->
  <rect x="96" y="184" width="320" height="44" fill="#070a13" fill-opacity="0.6"/>

  <!-- Card Hologram Chip -->
  <rect x="136" y="256" width="48" height="36" rx="8" fill="#334155" fill-opacity="0.5" stroke="#475569" stroke-width="2"/>
  
  <!-- Glowing Flowing Graph Line -->
  <path d="M168 330 L224 280 L280 304 L344 240" stroke="url(#accentGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#neonGlow)"/>
  
  <!-- Endpoints for the trend line -->
  <circle cx="168" cy="330" r="10" fill="#4f46e5"/>
  <circle cx="344" cy="240" r="10" fill="#05f3a6" filter="url(#neonGlow)"/>
</svg>
